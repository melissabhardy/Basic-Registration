<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,100..900;1,100..900&family=Raleway:ital,wght@0,800;1,800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="app.css">
    <title>Document</title>
</head>

<body>
    <!-- Form -->
    <form action="">
        <!-- Main Heading -->
        <h1>Register</h1>

        <!-- Name -->
        <div class="name">
            <label for="firstname" id="firstname">First Name:</label>
            <input type="text" name="" id="fname" placeholder="Enter first name.">

            <label for="lastname" id="lastname">Last Name:</label>
            <input type="text" id="lname" placeholder="Enter last name. ">

        </div>
        <!-- Email -->
        <div class="email">
            <label for="" id="e_mail">Email:</label>
            <input type="email" name="" id="ent_email" placeholder="Enter email address.">
        </div>
        <!-- Address -->
        <div class="address">
            <label for="">Street Address:</label>
            <input type="text" id="streetaddress" placeholder="Enter Address">
            <label for="">City:</label>
            <input type="text" id="city" placeholder="Enter City">
        </div>
        <div class="state">

            <label for="">State:</label>
            <input type="text" id="entstate" placeholder="Enter State" maxlength="2" >
            <label for="">Zip Code:</label>
            <input type="text" name="" id="zip" maxlength="5" placeholder="Enter Zip code">
        </div>

        <!-- Phone Number -->
        <div class="phone">
            <label for="">Phone Number:</label>
            <input type="text" id="phonenum" placeholder="Enter Phone Number" minlength="10">

        </div>

        <!-- User Name -->
        <div class="username">
            <label for="">Username:</label>
            <input type="text" name="" id="uname" placeholder="Enter Username">
        </div>

        <!-- Password and Conf -->
        <div class="password">
            <label for="">Password:</label>
            <input type="password" name="" id="entpassword" placeholder="Enter Password">
            <label for="">Confirm Password:</label>
            <input type="password" id="confpassword" placeholder="Confirm Password">
        </div>

        <!-- D.O.B and Gender-->
        <div class="birthdate">
            <label for="dob">Enter D.O.B</label>
            <input type="text" id="birth" placeholder="mm/dd/yyyy">
            <label for="gend" id="gend">Gender</label>
            <select id="gender" name="gender">
                <option value="female">Female</option>
                <option value="male">Male</option>
            </select>
        </div>
        <!-- Checkbox Terms and Conditions -->
        <div class="terms">
            <input type="checkbox" id="checkbox">
            <label for="checkbox" id="check">I accept all terms and conditions. </label>
        </div>

        <!-- Submit Button -->
        <div class="butt">
            <button>Submit</button>
        </div>
    </form>
</body>

</html>
